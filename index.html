<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<title>Controle</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#222;--border:#ddd}
.dark{--bg:#111827;--card:#1f2937;--text:#f3f4f6;--border:#374151}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);margin:0;padding:20px;max-width:1200px;margin:auto}
.card{background:var(--card);padding:20px;border-radius:12px;margin:15px 0}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid var(--border);text-align:left}
button{padding:8px 12px;margin:4px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}
.item{border:1px solid var(--border);padding:8px;border-radius:8px}
.hidden{display:none}
.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:16px;
    margin-bottom:20px;
}
.stat-card{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.dark .stat-card{
    background:linear-gradient(135deg,#1d4ed8,#2563eb);
}

.stat-label{
    font-size:.9rem;
    opacity:.85;
    margin-bottom:8px;
}

.stat-value{
    font-size:2rem;
    font-weight:700;
}

.table-wrapper{
    overflow-x:auto;
}

table{
    min-width:700px;
}

@media(max-width:768px){

    body{
        padding:12px;
    }

    .card{
        padding:15px;
    }

    button{
        width:100%;
        margin-bottom:8px;
    }

    .stat-value{
        font-size:1.6rem;
    }
}
  
</style>
</head>
<body>

<div class="card">
<button id="themeBtn">🌙 Tema</button>
<button id="exportBtn">💾 Exportar JSON</button>
</div>

<div class="card">
<h2>Consumo</h2>

<div class="stats">

    <div class="stat-card">
        <div class="stat-label">🐱 Média de duração da areia</div>
        <div class="stat-value" id="mediaAreia">-</div>
    </div>

    <div class="stat-card">
        <div class="stat-label">🍖 Média de duração da ração</div>
        <div class="stat-value" id="mediaRacao">-</div>
    </div>

</div>

<div class="table-wrapper">

<table>
<thead>
<tr>
<th>Item</th><th>Qtd</th><th>Início</th><th>Fim</th><th>Duração</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>
  
<script>
  let dados = { items: [] };
  
  function diasEntre(inicio, fim) {
    if (!fim) return null;

    const p1 = inicio.split('/');
    const p2 = fim.split('/');

    let dt1;
    let dt2;

    if (p1.length === 2) {
      dt1 = new Date(2026, Number(p1[1]) - 1, Number(p1[0]));
    } else {
      dt1 = new Date(Number(p1[2]), Number(p1[1]) - 1, Number(p1[0]));
    }

    if (p2.length === 2) {
      dt2 = new Date(2026, Number(p2[1]) - 1, Number(p2[0]));
    } else {
      dt2 = new Date(Number(p2[2]), Number(p2[1]) - 1, Number(p2[0]));
    }

    return Math.round(
      (dt2 - dt1) / (1000 * 60 * 60 * 24)
    );
  }
  
  function render() {
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
  
    let areia = [];
    let racao = [];
  
    dados.items.forEach(item => {
      const dias = diasEntre(item.inicio, item.fim);
  
      if (dias) {
        if (item.nome.toLowerCase().includes('areia')) {
          areia.push(dias);
        }
  
        if (
          item.nome.toLowerCase().includes('ração') ||
          item.nome.toLowerCase().includes('racao')
        ) {
          racao.push(dias);
        }
      }
  
      tbody.innerHTML += `
        <tr>
          <td>${item.nome}</td>
          <td>${item.quantidade}</td>
          <td>${item.inicio}</td>
          <td>${item.fim || '-'}</td>
          <td>${dias ? dias + ' dias' : 'Em andamento'}</td>
        </tr>
      `;
    });
  
    const avg = arr =>
      arr.length
        ? (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1)
        : '-';
  
    document.getElementById('mediaAreia').textContent =
      avg(areia) + ' dias';
  
    document.getElementById('mediaRacao').textContent =
      avg(racao) + ' dias';
  }
  
  document.getElementById('exportBtn').onclick = () => {
    const blob = new Blob(
      [JSON.stringify(dados, null, 2)],
      { type: 'application/json' }
    );
  
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'dados.json';
    a.click();
  };
  
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
  }
  
  document.getElementById('themeBtn').onclick = () => {
    document.body.classList.toggle('dark');
  
    localStorage.setItem(
      'theme',
      document.body.classList.contains('dark')
        ? 'dark'
        : 'light'
    );
  };
  
  async function carregarDados() {
    try {
      const response = await fetch('./dados.json?v=' + Date.now());
  
      if (!response.ok) {
        throw new Error(
          'Erro ao carregar JSON: ' + response.status
        );
      }
  
      dados = await response.json();
  
      console.log('Dados carregados:', dados);
  
      render();
    } catch (err) {
      console.error(err);
    }
  }
  
  carregarDados();
  </script>

</body>
</html>
